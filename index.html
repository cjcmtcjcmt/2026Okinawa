<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 沖繩自駕行程</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 動畫定義 */
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate-slide-right { animation: slideInRight 0.4s ease-out forwards; }
        .animate-slide-left { animation: slideInLeft 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // SVG Icons
        const IconNavigation = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>;
        const IconCalendar = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
        const IconThermometer = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"/></svg>;
        const IconCloudRain = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M16 14v6"/><path d="M8 14v6"/><path d="M12 16v6"/></svg>;
        const IconMapPin = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const IconExternalLink = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></svg>;
        const IconHotel = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 21h18"/><path d="M5 21V7a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v14"/><path d="M9 21v-4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v4"/><path d="M10 9h4"/><path d="M10 13h4"/></svg>;
        const IconInfo = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="16" y2="12"/><line x1="12" x2="12.01" y1="8" y2="8"/></svg>;
        const IconPlane = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>;
        const IconShopping = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" x2="21" y1="6" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>;
        const IconCar = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>;

        const App = () => {
            const itineraryData = [
                {
                    dateKey: "2026-04-04", day: "4/4 (六)", title: "那霸市區巡禮",
                    hotel: { 
                        name: "Glory island okinawa -SOBE", 
                        address: "2-41-14 Sobe, Naha, Okinawa-ken, 900-0023 日本", 
                        price: "查詢中", 
                        features: ["那霸市中心公寓式飯店", "近漫湖公園", "交通便利，適合居家感住宿"] 
                    },
                    events: [
                        { time: "08:10", activity: "搭乘 CI120 前往沖繩", icon: <IconPlane />, detail: "桃園 T2 出發 | 10:45 抵達那霸 I 航廈", statusUrl: "https://tw.trip.com/flights/status-ci120/" },
                        { time: "上午", activity: "Outlet 購物 / 國際通逛街", icon: <IconShopping />, location: "Okinawa Outlet Mall Ashibinaa" },
                        { time: "下午", activity: "波上宮與波上沙灘散步", icon: <IconMapPin />, location: "Naminoue Beach" }
                    ]
                },
                {
                    dateKey: "2026-04-05", day: "4/5 (日)", title: "金武町美式風情",
                    hotel: { name: "ASBO STAY HOTEL", address: "10907, Kin, Okinawa, 904-1201 日本", price: "9,900 日幣", mapCode: "206 143 621 *20", features: ["近 KIN 日出海灘", "離山開車約 25 分鐘"] },
                    events: [
                        { time: "09:00", activity: "ORIX 旭橋站西店 取車", icon: <IconCar />, location: "沖縄県那覇市西2-3-1", detail: "車型：Fit 同等級 (SA) | 電話：098-866-0543", mapCode: "33 155 080 *06" },
                        { time: "中午", activity: "永旺夢樂城 沖繩來客夢", icon: <IconShopping />, location: "AEON MALL Okinawa Rycom", mapCode: "33 530 174 *76" },
                        { time: "下午", activity: "金武町新開地 (美式復古風)", icon: <IconMapPin />, location: "Shinkaichi, Kin", mapCode: "206 110 846 *56" },
                        { time: "食記", activity: "King Tacos 金武本店 (塔可飯)", icon: <IconInfo />, location: "King Tacos Kin", mapCode: "206 110 819 *87" }
                    ]
                },
                {
                    dateKey: "2026-04-06", day: "4/6 (一)", title: "恩納訪視與返那霸",
                    hotel: { name: "那霸小祿站前 WIZ 飯店", address: "Kanagusuku 5-9-1, Naha, Okinawa, 9011304 日本", price: "2,158 台幣", features: ["那霸永旺購物中心步行 1 分鐘", "近小祿站"] },
                    events: [
                        { time: "上午", activity: "恩納訪視 RIZZAN (宿舍採買)", icon: <IconMapPin />, location: "Rizzan Sea-Park Hotel Tancha-Bay", mapCode: "206 158 067 *40" },
                        { time: "18:00", activity: "ORIX 旭橋站西店 還車", icon: <IconCar />, location: "沖縄県那覇市西2-3-1", detail: "請預留加油與檢查車況時間", mapCode: "33 155 080 *06" },
                        { time: "晚上", activity: "那霸永旺購物中心採購", icon: <IconShopping />, location: "AEON Naha" }
                    ]
                },
                {
                    dateKey: "2026-04-07", day: "4/7 (二)", title: "賦歸",
                    events: [
                        { time: "11:55", activity: "搭乘 CI121 返台", icon: <IconPlane />, detail: "那霸 I 航廈出發 | 12:35 抵達桃園 T2", statusUrl: "https://tw.trip.com/flights/status-ci121/" }
                    ]
                }
            ];

            const [activeDay, setActiveDay] = useState(0);
            const [weatherData, setWeatherData] = useState({});
            const [slideDir, setSlideDir] = useState('right'); // 動畫方向
            const touchStart = useRef(null);
            const touchEnd = useRef(null);

            // 初始化：自動根據當前日期切換
            useEffect(() => {
                const today = new Date().toLocaleDateString('sv'); // 格式 YYYY-MM-DD
                const todayIndex = itineraryData.findIndex(d => d.dateKey === today);
                if (todayIndex !== -1) {
                    setActiveDay(todayIndex);
                }

                // 獲取天氣
                fetch(`https://api.open-meteo.com/v1/forecast?latitude=26.21&longitude=127.68&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia%2FTokyo`)
                    .then(res => res.json())
                    .then(data => {
                        const weatherMap = {};
                        if (data.daily) {
                            data.daily.time.forEach((date, index) => {
                                weatherMap[date] = {
                                    max: Math.round(data.daily.temperature_2m_max[index]),
                                    min: Math.round(data.daily.temperature_2m_min[index]),
                                    rain: data.daily.precipitation_probability_max[index]
                                };
                            });
                        }
                        setWeatherData(weatherMap);
                    });
            }, []);

            // 手動切換日期（含動畫方向判定）
            const handleDayChange = (newIdx) => {
                if (newIdx === activeDay) return;
                setSlideDir(newIdx > activeDay ? 'right' : 'left');
                setActiveDay(newIdx);
            };

            // 滑動處理
            const onTouchStart = (e) => (touchStart.current = e.targetTouches[0].clientX);
            const onTouchMove = (e) => (touchEnd.current = e.targetTouches[0].clientX);
            const onTouchEnd = () => {
                if (!touchStart.current || !touchEnd.current) return;
                const distance = touchStart.current - touchEnd.current;
                if (distance > 50 && activeDay < itineraryData.length - 1) handleDayChange(activeDay + 1);
                if (distance < -50 && activeDay > 0) handleDayChange(activeDay - 1);
                touchStart.current = null; touchEnd.current = null;
            };

            const currentDayWeather = weatherData[itineraryData[activeDay].dateKey];

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 font-sans pb-12 overflow-x-hidden">
                    <header className="bg-indigo-700 text-white p-8 shadow-md">
                        <div className="max-w-4xl mx-auto text-center md:text-left">
                            <h1 className="text-3xl md:text-4xl font-black flex items-center justify-center md:justify-start gap-3">
                                <IconNavigation /> 2026 沖繩自駕行程
                            </h1>
                            <p className="mt-2 text-indigo-100 text-lg opacity-90">04/04 - 04/07 | 那霸・金武・恩納</p>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4 md:p-8 space-y-8">
                        {/* 頁籤 */}
                        <div className="flex bg-white rounded-2xl shadow-sm p-1.5 border border-slate-200 overflow-x-auto no-scrollbar">
                            {itineraryData.map((day, idx) => (
                                <button
                                    key={idx}
                                    onClick={() => handleDayChange(idx)}
                                    className={`flex-1 py-4 px-4 rounded-xl text-base font-bold transition-all whitespace-nowrap ${
                                        activeDay === idx ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-500 hover:bg-slate-50'
                                    }`}
                                >
                                    Day {idx + 1}
                                    <span className="block text-xs font-normal opacity-70 mt-0.5">{day.day.split(' ')[0]}</span>
                                </button>
                            ))}
                        </div>

                        {/* 行程卡片 */}
                        <div 
                            className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden relative"
                            onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
                        >
                            {/* 動畫容器 - key 變化時觸發動畫 */}
                            <div key={activeDay} className={slideDir === 'right' ? 'animate-slide-right' : 'animate-slide-left'}>
                                <div className="bg-slate-50 px-6 md:px-8 py-6 border-b border-slate-200">
                                    <div className="flex flex-col md:flex-row md:items-end justify-between gap-4">
                                        <div>
                                            <h2 className="text-3xl font-black text-slate-800 flex items-center gap-3">
                                                <IconCalendar /> {itineraryData[activeDay].day}
                                            </h2>
                                            <p className="text-indigo-600 font-bold mt-1 ml-11">{itineraryData[activeDay].title}</p>
                                        </div>
                                        <div className="flex items-center gap-6 bg-white px-5 py-3 rounded-2xl border border-slate-100 shadow-sm self-end">
                                            <div className="flex items-center gap-2">
                                                <span className="text-orange-500"><IconThermometer /></span>
                                                <div className="text-sm">
                                                    <p className="text-[10px] text-slate-400 font-bold uppercase leading-none mb-1">溫度</p>
                                                    <p className="font-black text-slate-700">{currentDayWeather ? `${currentDayWeather.min}°~${currentDayWeather.max}°` : "載入中"}</p>
                                                </div>
                                            </div>
                                            <div className="w-px h-8 bg-slate-100"></div>
                                            <div className="flex items-center gap-2">
                                                <span className="text-indigo-400"><IconCloudRain /></span>
                                                <div className="text-sm">
                                                    <p className="text-[10px] text-slate-400 font-bold uppercase leading-none mb-1">降雨率</p>
                                                    <p className="font-black text-slate-700">{currentDayWeather ? `${currentDayWeather.rain}%` : "--"}</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="p-6 md:p-8 space-y-10">
                                    <div className="space-y-10 relative before:absolute before:inset-0 before:left-4 before:w-1 before:bg-slate-50">
                                        {itineraryData[activeDay].events.map((event, i) => (
                                            <div key={i} className="relative pl-14 flex flex-col md:flex-row md:items-start justify-between group">
                                                <div className="absolute left-0 top-1 w-9 h-9 rounded-full bg-white border-4 border-indigo-600 z-10 flex items-center justify-center text-indigo-600 shadow-sm">{event.icon}</div>
                                                <div className="flex-1">
                                                    <span className="text-xs font-bold uppercase tracking-widest text-indigo-400">{event.time}</span>
                                                    <h3 className="text-xl font-bold text-slate-800 mt-1">{event.activity}</h3>
                                                    {event.detail && <p className="text-sm text-slate-500 mt-1 italic">{event.detail}</p>}
                                                    {event.statusUrl && <a href={event.statusUrl} target="_blank" className="mt-2 inline-flex items-center gap-1.5 px-3 py-1 rounded-lg bg-green-100 text-green-700 text-xs font-bold border border-green-200">即時航班動態 <IconExternalLink /></a>}
                                                    {event.mapCode && <div className="mt-2 inline-flex items-center gap-1.5 px-3 py-1 rounded-lg bg-amber-100 text-amber-700 text-xs font-bold border border-amber-200"><IconNavigation /> Mapcode: {event.mapCode}</div>}
                                                </div>
                                                {event.location && <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(event.location)}`} target="_blank" className="mt-3 md:mt-0 flex items-center gap-2 px-4 py-2 bg-slate-50 text-indigo-600 border border-slate-200 rounded-xl text-sm font-bold shadow-sm">導航 <IconExternalLink /></a>}
                                            </div>
                                        ))}
                                    </div>

                                    {itineraryData[activeDay].hotel && (
                                        <div className="mt-12 bg-slate-900 text-white rounded-3xl p-6 md:p-8 shadow-xl relative overflow-hidden">
                                            <div className="absolute top-0 right-0 p-8 opacity-10"><IconHotel /></div>
                                            <div className="relative z-10">
                                                <div className="flex flex-col md:flex-row justify-between items-start gap-4 mb-6">
                                                    <div>
                                                        <span className="text-indigo-400 text-xs font-black uppercase tracking-widest mb-2 block">Accommodation</span>
                                                        <h4 className="text-2xl font-black leading-tight">{itineraryData[activeDay].hotel.name}</h4>
                                                    </div>
                                                    <div className="bg-indigo-600 px-4 py-2 rounded-2xl text-lg font-black shadow-lg">{itineraryData[activeDay].hotel.price}</div>
                                                </div>
                                                <div className="flex items-start gap-2 text-slate-400 mb-6"><IconMapPin /> <p className="text-sm">{itineraryData[activeDay].hotel.address}</p></div>
                                                {itineraryData[activeDay].hotel.mapCode && <div className="mb-6 inline-flex items-center gap-1.5 px-3 py-1 rounded-lg bg-white/10 text-white text-xs font-bold border border-white/20"><IconNavigation /> Mapcode: {itineraryData[activeDay].hotel.mapCode}</div>}
                                                <div className="flex flex-wrap gap-2 mb-8">{itineraryData[activeDay].hotel.features.map((f, i) => <span key={i} className="text-xs px-3 py-1.5 bg-white/10 text-slate-200 rounded-lg backdrop-blur-sm">{f}</span>)}</div>
                                                <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(itineraryData[activeDay].hotel.name + " " + itineraryData[activeDay].hotel.address)}`} target="_blank" className="inline-flex items-center justify-center gap-3 w-full bg-white text-slate-900 py-4 rounded-2xl text-base font-black shadow-xl">飯店地圖導航 <IconExternalLink /></a>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                            <div className="bg-slate-50 py-3 text-center text-[10px] text-slate-400 uppercase tracking-widest border-t border-slate-100">← 左右滑動切換日期 →</div>
                        </div>
                    </main>

                    <footer className="max-w-4xl mx-auto px-8 pt-12 text-center">
                        <div className="h-px bg-slate-200 w-full mb-8"></div>
                        <p className="text-slate-400 text-xs font-medium tracking-widest uppercase">© 2026 Okinawa Journey Planner | 祝您旅途愉快</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
